<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>出国税チェッカー | 国外転出時課税制度</title>
<meta name="description" content="日本の居住者が海外へ移住する際の「国外転出時課税制度（出国税）」に該当するかを、出国予定日から逆算して確認できます。">
<style>
:root{
  --paper:#F4F5F3; --card:#FCFCFB; --ink:#1A1C1B; --ink-2:#41453F;
  --muted:#6E736C; --rule:#D6D9D4; --rule-2:#E8EAE6;
  --signal:#C8102E;            /* 唯一の突出色：出国の瞬間 */
  --mincho:"Hiragino Mincho ProN","Yu Mincho",YuMincho,"MS PMincho",serif;
  --gothic:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Roboto Mono",monospace;
  --sp:1.6rem;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  background:var(--paper); color:var(--ink); font-family:var(--gothic);
  line-height:1.85; font-size:.95rem; letter-spacing:.01em;
  padding:var(--sp) 1rem 5rem;
}
.wrap{max-width:44rem;margin:0 auto}
.nb{white-space:nowrap}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:0}

/* ---- 見出し ---- */
h1{font-family:var(--mincho);font-size:2rem;font-weight:600;line-height:1.4;letter-spacing:.04em}
h2{font-family:var(--mincho);font-size:1.15rem;font-weight:600;letter-spacing:.05em;
   margin:0 0 .9rem;padding-bottom:.4rem;border-bottom:1px solid var(--rule)}
h3{font-family:var(--gothic);font-size:.92rem;font-weight:700;letter-spacing:.03em}

/* ---- ヘッダ：言語切替はgridで位置固定（flex-wrapを使わない） ---- */
.masthead{display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:start;
  border-bottom:2px solid var(--ink);padding-bottom:1rem;margin-bottom:1.1rem}
.tagline{font-size:.82rem;color:var(--muted);margin-top:.35rem;line-height:1.7}
.langsw{display:grid;grid-template-columns:auto auto;border:1px solid var(--rule);background:var(--card)}
.langsw button{font-family:var(--mono);font-size:.72rem;padding:.3rem .6rem;min-height:2.4rem;
  min-width:2.75rem;border:0;background:transparent;color:var(--muted);cursor:pointer;letter-spacing:.08em}
.langsw button[aria-pressed="true"]{background:var(--ink);color:var(--paper)}
.langsw button:focus-visible{outline:2px solid var(--signal);outline-offset:-2px}

.notthis{border-left:3px solid var(--rule);padding:.5rem 0 .5rem .8rem;
  font-size:.8rem;color:var(--muted);margin-bottom:1.8rem}

/* ---- ステップ ---- */
.step{background:var(--card);border:1px solid var(--rule);padding:1.2rem 1.1rem;margin-bottom:.9rem}
.step[hidden]{display:none}
.stepno{font-family:var(--mono);font-size:.68rem;color:var(--muted);letter-spacing:.14em;
  display:block;margin-bottom:.25rem}
.q{font-size:.95rem;font-weight:600;margin-bottom:.15rem;line-height:1.7}
.help{font-size:.78rem;color:var(--muted);line-height:1.75;margin-bottom:.7rem}

.choices{display:grid;gap:.4rem;margin-top:.6rem}
.choices.two{grid-template-columns:1fr 1fr}
/* タップ領域は44px以上（WCAG 2.5.5）。主要ユーザーは40代以上を想定。 */
.choices button{font-family:var(--gothic);font-size:.87rem;padding:.6rem .5rem;min-height:2.75rem;
  border:1px solid var(--rule);background:var(--paper);color:var(--ink-2);cursor:pointer;
  text-align:center;line-height:1.5}
.choices button:hover{border-color:var(--ink);color:var(--ink)}
.choices button[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.choices button:focus-visible{outline:2px solid var(--signal);outline-offset:2px}

input[type=date],input[type=text]{font-family:var(--mono);font-variant-numeric:tabular-nums;
  font-size:.95rem;padding:.5rem .6rem;min-height:2.75rem;border:1px solid var(--rule);
  background:var(--paper);color:var(--ink);width:100%;max-width:15rem}
input:focus-visible{outline:2px solid var(--signal);outline-offset:1px}
.field{display:grid;gap:.3rem;margin-top:.5rem}
.sidenote{font-size:.75rem;color:var(--muted);line-height:1.7}

/* ---- 折りたたみ：開く前に「誰が開くべきか」を常時表示 ---- */
details{border-top:1px solid var(--rule-2);margin-top:.9rem;padding-top:.7rem}
summary{cursor:pointer;font-size:.82rem;font-weight:600;color:var(--ink-2);list-style:none;
  display:grid;grid-template-columns:1rem 1fr;gap:.4rem;align-items:start;
  min-height:2.75rem;align-content:center}
summary::-webkit-details-marker{display:none}
summary::before{content:"＋";font-family:var(--mono);color:var(--muted);font-size:.8rem}
details[open] summary::before{content:"−"}
summary:focus-visible{outline:2px solid var(--signal);outline-offset:2px}
/* summaryは2列grid（＋記号 / 本文）。3つ目の要素は2行目の2列目に置く。
   grid-column を指定しないと幅1remの1列目に落ち、1文字ずつ縦書きになる。 */
.whofor{grid-column:2;font-size:.75rem;color:var(--muted);font-weight:400;margin-top:.1rem;line-height:1.7}
.dbody{padding:.7rem 0 .2rem 1.4rem}

/* 任意の選択肢はチェックボックス。折りたたみで二重に関門を作らない。 */
.check{display:grid;grid-template-columns:1.1rem 1fr;gap:.6rem;align-items:start;cursor:pointer;
  margin-top:.9rem;padding-top:.85rem;border-top:1px solid var(--rule-2);min-height:2.75rem}
.check[hidden]{display:none}
.check input{appearance:none;-webkit-appearance:none;width:1.1rem;height:1.1rem;margin:.2rem 0 0;
  border:1px solid var(--muted);background:var(--paper);cursor:pointer;display:grid;place-content:center}
.check input:checked{background:var(--ink);border-color:var(--ink)}
.check input:checked::after{content:"✓";color:var(--paper);font-family:var(--mono);font-size:.72rem;line-height:1}
.check input:focus-visible{outline:2px solid var(--signal);outline-offset:2px}
.check:hover input{border-color:var(--ink)}
.check strong{font-size:.87rem;font-weight:600;display:block;line-height:1.65}
.check .sidenote{display:block;margin-top:.25rem}

/* ---- 資産チェックリスト ---- */
.assets{display:grid;gap:1rem;margin-top:.6rem}
.acol h3{margin-bottom:.2rem;font-size:.8rem;letter-spacing:.06em}
.colnote{font-size:.75rem;color:var(--muted);line-height:1.7;margin-bottom:.5rem}
.acol.inc h3{color:var(--ink)}
.acol.exc h3{color:var(--muted)}
.alist{list-style:none;display:grid;gap:.15rem}
.alist li{font-size:.83rem;padding-left:1.1rem;position:relative;line-height:1.7}
.acol.inc .alist li::before{content:"✓";position:absolute;left:0;font-family:var(--mono);color:var(--ink)}
.acol.exc .alist li{color:var(--muted)}
.acol.exc .alist li::before{content:"—";position:absolute;left:0;font-family:var(--mono)}
.anote{font-size:.72rem;color:var(--muted);display:block;line-height:1.6}

/* ---- 期間入力 ---- */
.periods{display:grid;gap:.4rem;margin-top:.5rem}
.prow{display:grid;grid-template-columns:1fr auto 1fr auto;gap:.4rem;align-items:center}
.prow span{font-size:.8rem;color:var(--muted)}
.prow input{max-width:none}
.prow button{border:1px solid var(--rule);background:var(--paper);color:var(--muted);
  cursor:pointer;font-family:var(--mono);font-size:.8rem;padding:.35rem .55rem;line-height:1;
  min-height:2.75rem;min-width:2.75rem}
.prow button:hover{border-color:var(--signal);color:var(--signal)}
.addrow{border:1px dashed var(--rule);background:transparent;color:var(--ink-2);cursor:pointer;
  font-family:var(--gothic);font-size:.8rem;padding:.45rem;width:100%;min-height:2.75rem}
.addrow:hover{border-color:var(--ink)}

/* ---- 結果 ---- */
.result{border:2px solid var(--ink);background:var(--card);padding:1.3rem 1.1rem;margin-top:1.6rem}
.verdict{font-family:var(--mincho);font-size:1.5rem;font-weight:600;letter-spacing:.05em;line-height:1.4}
.vsub{font-size:.83rem;color:var(--muted);margin-top:.3rem;line-height:1.8}
.legalterm{font-family:var(--mono);font-size:.75rem;color:var(--muted);letter-spacing:.02em;
  border-top:1px solid var(--rule-2);margin-top:.9rem;padding-top:.7rem;line-height:1.8}
.distance{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:.85rem;
  color:var(--ink-2);margin-top:.5rem}
.result.pending{border-width:1px;border-color:var(--rule)}
.result.pending .verdict{font-size:1.15rem;color:var(--ink-2)}
.needs{list-style:none;display:grid;gap:.35rem;margin-top:.9rem}
.needs li{font-size:.84rem;color:var(--muted);padding-left:1.4rem;position:relative;line-height:1.7}
.needs li::before{content:"□";position:absolute;left:0;font-family:var(--mono)}
.needs li.next{color:var(--ink);font-weight:700}
.needs li.next::before{content:"▶"}
.nexttag{font-family:var(--mono);font-size:.65rem;border:1px solid var(--ink);padding:0 .25rem;
  margin-left:.4rem;font-weight:400;letter-spacing:.04em;white-space:nowrap}

/* ---- 逆算タイムライン（signature） ---- */
.tl{margin-top:1.3rem;border-top:1px solid var(--rule);padding-top:1rem}
.tlhead{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;color:var(--muted);margin-bottom:.8rem}
.tlist{list-style:none;position:relative;padding-left:1.1rem}
.tlist::before{content:"";position:absolute;left:.24rem;top:.5rem;bottom:.5rem;width:1px;background:var(--rule)}
.tli{display:grid;grid-template-columns:7.2rem 1fr;gap:.6rem;padding:.42rem 0;position:relative;
  align-items:baseline}
.tli::before{content:"";position:absolute;left:-1.1rem;top:.85rem;width:.52rem;height:.52rem;
  border-radius:50%;background:var(--paper);border:1px solid var(--muted)}
.tli.past::before{background:var(--rule);border-color:var(--rule)}
.tli.crit::before{background:var(--signal);border-color:var(--signal);width:.62rem;height:.62rem;left:-1.15rem}
.tli.today::before{background:var(--ink);border-color:var(--ink)}
.tdate{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:.8rem;color:var(--ink-2)}
.tli.past .tdate,.tli.past .tlabel{color:var(--muted)}
.tlabel{font-size:.83rem;line-height:1.65}
.tli.crit .tlabel{font-weight:700;color:var(--signal)}
.tli.crit .tdate{color:var(--signal);font-weight:700}
.tli.today{border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);margin:.3rem 0}
.tli.today .tlabel,.tli.today .tdate{font-weight:700}
.tdelta{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:.72rem;color:var(--muted);
  display:block;margin-top:.05rem}
.tli.crit .tdelta{color:var(--signal)}
.approx{font-family:var(--mono);font-size:.65rem;color:var(--muted);border:1px solid var(--rule);
  padding:0 .2rem;margin-left:.3rem;letter-spacing:.04em}

/* ---- 印刷専用の入力サマリー ---- */
.printsum{display:none}

/* ---- 出典・免責 ---- */
.sec{margin-top:2.2rem}
.srclist{list-style:none;display:grid;gap:.3rem}
.srclist li{font-size:.8rem;padding-left:1rem;position:relative;line-height:1.7}
.srclist li::before{content:"▸";position:absolute;left:0;color:var(--muted);font-size:.7rem}
a{color:var(--ink);text-decoration:underline;text-underline-offset:.18em;
  text-decoration-color:var(--rule);text-decoration-thickness:1px}
a:hover{text-decoration-color:var(--signal)}
a:focus-visible{outline:2px solid var(--signal);outline-offset:2px}
.asof{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-top:.6rem;letter-spacing:.02em}
.disc{font-size:.8rem;color:var(--ink-2);line-height:1.9}
.disc strong{color:var(--ink)}

.tools{display:grid;grid-template-columns:auto auto auto;gap:.4rem;justify-content:start;margin-top:1.3rem}
.tools button{font-family:var(--gothic);font-size:.78rem;padding:.42rem .8rem;min-height:2.75rem;
  border:1px solid var(--rule);background:var(--card);color:var(--ink-2);cursor:pointer}
.tools button:hover{border-color:var(--ink);color:var(--ink)}
.tools button:focus-visible{outline:2px solid var(--signal);outline-offset:2px}

footer{border-top:1px solid var(--rule);margin-top:2.6rem;padding-top:1rem;
  font-size:.72rem;color:var(--muted);line-height:1.8}

@media (max-width:520px){
  :root{--sp:1rem}
  h1{font-size:1.5rem}
  .tli{grid-template-columns:6.2rem 1fr}
  .prow{grid-template-columns:1fr auto;grid-auto-rows:auto}
  .prow span:nth-of-type(1){display:none}
  .tools{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ---- 印刷：色を保持 ---- */
@media print{
  :root{--paper:#fff;--card:#fff}
  html,body{background:#fff}
  body{padding:0;font-size:10pt}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .langsw,.tools,.step:not(.printable),.addrow{display:none!important}
  .result{border:2px solid #000;break-inside:avoid}
  .printsum{display:block;margin-top:.9rem;border-top:1px solid var(--rule);padding-top:.7rem}
  .printsum h3{font-size:8pt;letter-spacing:.08em;color:#555;margin-bottom:.35rem}
  .printsum table{width:100%;border-collapse:collapse}
  .printsum th{text-align:left;font-weight:400;color:#555;width:12em;padding:.12rem 0;
    vertical-align:top;font-size:8.5pt;white-space:nowrap}
  .printsum td{font-family:var(--mono);font-variant-numeric:tabular-nums;padding:.12rem 0;font-size:8.5pt}
  .tl{break-inside:avoid}
  .tli.crit .tlabel,.tli.crit .tdate,.tli.crit .tdelta{color:var(--signal)!important}
  .tli.crit::before{background:var(--signal)!important;border-color:var(--signal)!important}
  a{text-decoration:none}
  a[href^="http"]::after{content:" (" attr(href) ")";font-size:7pt;color:#555;word-break:break-all}
  footer{border-top:1px solid #000}
}
</style>
</head>
<body>
<div class="wrap">

<header class="masthead">
  <div>
    <h1 id="t-title"></h1>
    <p class="tagline" id="t-tagline"></p>
  </div>
  <div class="langsw" role="group" aria-label="Language">
    <button type="button" data-lang="ja">JA</button>
    <button type="button" data-lang="en">EN</button>
  </div>
</header>

<p class="notthis" id="t-notthis"></p>

<main id="steps"></main>

<section class="result" id="result" aria-live="polite"></section>

<div class="tools">
  <button type="button" id="btn-print"></button>
  <button type="button" id="btn-share"></button>
  <button type="button" id="btn-reset"></button>
</div>
<p class="sidenote" id="t-sharenote" style="margin-top:.6rem"></p>

<section class="sec"><h2 id="t-src-h"></h2>
  <ul class="srclist" id="src-primary"></ul>
  <p class="asof" id="t-asof"></p>
  <h3 style="margin-top:1.2rem" id="t-ref-h"></h3>
  <ul class="srclist" id="src-ref" style="margin-top:.4rem"></ul>
</section>

<section class="sec"><h2 id="t-disc-h"></h2>
  <p class="disc" id="t-disc"></p>
</section>

<footer><p id="t-copy"></p></footer>
</div>

<script>
'use strict';
/* ============================================================
   RULES — 制度データ。ロジックから分離。改正時はここだけ差し替える。
   ============================================================ */
const RULES = {
  meta:{ lawAsOf:'2026-07-01', faqRevision:'2023-06', reviewedOn:'2026-07-16',
         enforcedFrom:{y:2015,m:7,d:1} },
  threshold:{ amount:100000000, comparison:'gte' },
  residency:{
    lookbackYears:10, requiredYears:5, comparison:'gt',
    // 数え方は所基通2-4の3（非永住者判定）に倣う。60の2 専用の通達は公表されていないため類推。
    counting:{ circular:'2-4-3', startsDayAfterEntry:true, daysPerMonth:30, monthsPerYear:12,
               windowCircular:'2-4-2', byAnalogy:true },
    nearLineDays:30,   // この範囲では判定はするが、警告を出す
  },
  valuation:{
    withTaxAgent:   { offsetMonths:0 },
    withoutTaxAgent:{ offsetMonths:-3, dayRule:'responseDay', onMissingDay:'undecidable' }
  },
  assets:{
    included:[{key:'listedStock'},{key:'unlistedStock'},{key:'fund'},{key:'bond'},
              {key:'nisa',note:'nisaNote'},{key:'tokumeiKumiai'},{key:'marginTrading'},
              {key:'whenIssued'},{key:'derivative'}],
    excludedCommon:[{key:'crypto',note:'cryptoNote'},{key:'cash'},{key:'realEstate'},{key:'niniKumiai'}],
    excludedOptional:[{key:'unvestedRS'},{key:'qualifiedSO'}]
  },
  timeline:{ transfer:[
    {id:'valuationDate',   offset:{months:-3}, dayRule:'responseDay', precision:'exact', showIf:'noAgent'},
    {id:'taxAgentDeadline',offset:{},          precision:'exact', severity:'critical'},
    {id:'filingNoAgent',   offset:{},          precision:'exact', showIf:'noAgent'},
    {id:'filingWithAgent', rule:'mar15OfNextYear', precision:'exact', showIf:'agent'},
    {id:'collateral',      rule:'mar15OfNextYear', precision:'exact', showIf:'deferral'},
    {id:'continuationNotice',rule:'mar15OfNextYear',recurring:true,precision:'exact',showIf:'deferral'},
    {id:'extensionNotice', offset:{years:5},   precision:'approx', showIf:'deferral'},
    {id:'revocationLimit', offset:{years:5},   precision:'approx'},
    {id:'deferralDue',     offset:{years:5,months:4},  precision:'approx', showIf:'deferral'},
    {id:'deferralDueExt',  offset:{years:10,months:4}, precision:'approx', showIf:'deferral'}
  ]},
  taxRate:{ total:0.15315 },
  statute:{ defaultYears:7, withAgentYears:5 },
  sources:{
    primary:[
      {key:'ntaPortal', url:'https://www.nta.go.jp/taxes/shiraberu/shinkoku/kokugai/01.htm'},
      {key:'ntaOutline',url:'https://www.nta.go.jp/taxes/shiraberu/shinkoku/kokugai/pdf/03.pdf'},
      {key:'ntaFaq',    url:'https://www.nta.go.jp/taxes/shiraberu/shinkoku/kokugai/pdf/02.pdf'},
      {key:'ntaAnswer', url:'https://www.nta.go.jp/taxes/shiraberu/taxanswer/shotoku/1478.htm'},
      {key:'ntaForms',  url:'https://www.nta.go.jp/taxes/shiraberu/shinkoku/kokugai/yoshiki/index.htm'}
    ],
    reference:[
      {key:'egov', url:'https://laws.e-gov.go.jp/law/340AC0000000033'},
      {key:'zeirishi', url:'https://www.nta.go.jp/taxes/zeirishi/search/search.htm'}
    ]
  }
};

/* ============================================================
   I18N — 表示テキストは全部ここ。ja/en はキー数が必ず一致する。
   ============================================================ */
const I18N = {
ja:{
 title:'出国税チェッカー',
 tagline:'日本の居住者が海外へ移住するとき、売っていない株式等の含み益に所得税がかかることがあります。出国予定日から逆算して確認します。',
 notthis:'これは航空券に上乗せされる1,000円の税（国際観光旅客税）の話ではありません。有価証券等の含み益に対する所得税の話です。',
 langJa:'JA', langEn:'EN',

 s1no:'STEP 1', s1q:'いま、生活の本拠は日本にありますか。',
 s1help:'仕事・住まい・家族の中心が日本にあるかどうかで考えてください。長期の海外赴任中で日本に戻る予定がない場合は「いいえ」です。',
 s1yes:'はい、日本が中心', s1nono:'いいえ、すでに海外が中心',

 s2no:'STEP 2', s2q:'海外へ移り住む予定はありますか。',
 s2help:'1年以上、日本に住まいも生活の拠点も持たなくなる予定を指します。旅行や短期出張は含みません。',
 s2yes:'ある', s2nono:'ない',
 s2date:'出国の予定日',
 s2dhelp:'この1つの日付から、すべての期限を逆算します。日にちが未定なら、いまの見込みで構いません。',

 s3no:'STEP 3', s3q:'出国予定日より前の10年間、ずっと日本に住んでいましたか。',
 s3help:'途中で数年だけ海外にいた、という場合は「海外にいた時期がある」を選ぶと、期間を入力できます。',
 s3yes:'ずっと日本', s3nono:'海外にいた時期がある',
 s3plabel:'日本に住んでいた期間',
 s3from:'から', s3to:'まで', s3add:'＋ 期間を追加', s3del:'削除',

 statuteBody:'この制度が関係する所得税の更正・決定の期間制限は原則7年です。納税管理人の届出と税務代理権限証書の提出があれば5年になります。つまり、届け出ずに出国した場合、7年間さかのぼって課税される可能性があります。',

 fxCreditBody:'日本は出国の時点の含み益に課税します。その後、移住先の国で実際に売ると、その国も同じ利益に課税することがあります。同じ儲けに二重に課税される状態です。この場合、納税猶予を使っていれば、外国所得税を納付することとなる日から4か月以内に更正の請求をすることで、外国税額控除を適用できます。ただしこの措置は納税猶予を受けていることが条件なので、猶予を使わずに出国前に納めきった方は使えません。贈与・相続の場合も対象外です。移住先の税制と合わせた判断になるため、税理士にご相談ください。',

 inheritBody:'1億円以上の対象資産を持つ居住者が亡くなり、海外に住む相続人や受遺者がその資産を取得すると、亡くなった方に所得税がかかります（国外転出（相続）時課税）。準確定申告の期限は、相続があったことを知った日の翌日から4か月を経過した日の前日です。資産を取得しない相続人も申告が必要です。海外在住の相続人が複数いる場合、納税管理人の届出は全員の連署でします。限定承認の場合はこの制度は適用されませんが、別の規定でみなし譲渡課税が生じます。ここは判定が重く、遺産分割の状況にも左右されるため、このツールでは判定せず案内にとどめます。該当しそうなら税理士にご相談ください。',

 giftBody:'1億円以上の対象資産を持つ居住者が、海外に住む親族等へその一部でも贈与すると、贈与した側に所得税がかかります（国外転出（贈与）時課税）。1億円の判定は、贈与した分だけでなく、贈与の時に持っていた対象資産の全部の合計で行います。申告期限は贈与した年の翌年3月15日です。贈与する方が日本に住み続ける場合、納税猶予を受けるのに納税管理人の届出は要りません（ただし猶予期間中にご自身が出国するなら、その時までに届出が必要です）。なお、贈与と相続では外国税額控除は使えません。',

/* ============================================================
   日付ユーティリティ（すべてUTC）
   ============================================================ */
const D={
 daysInMonth:(y,m)=>new Date(Date.UTC(y,m,0)).getUTCDate(),
 isValid:p=>!!p&&Number.isInteger(p.y)&&p.m>=1&&p.m<=12&&p.d>=1&&p.d<=D.daysInMonth(p.y,p.m),
 ms:p=>Date.UTC(p.y,p.m-1,p.d),
 of:ms=>{const d=new Date(ms);return{y:d.getUTCFullYear(),m:d.getUTCMonth()+1,d:d.getUTCDate()};},
 diffDays:(a,b)=>Math.round((D.ms(a)-D.ms(b))/86400000),
 dow:p=>new Date(D.ms(p)).getUTCDay(),
 cmp:(a,b)=>D.ms(a)-D.ms(b),
 iso:p=>`${p.y}-${String(p.m).padStart(2,'0')}-${String(p.d).padStart(2,'0')}`,
 parse:s=>{const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(s||'');if(!m)return null;
   const p={y:+m[1],m:+m[2],d:+m[3]};return D.isValid(p)?p:null;},
 shiftResponseDay(p,{years=0,months=0}={}){
   const t=p.m-1+months+years*12, y=p.y+Math.floor(t/12), m=((t%12)+12)%12+1;
   return p.d>D.daysInMonth(y,m)?null:{y,m,d:p.d};},
 shiftClamped(p,o){const e=D.shiftResponseDay(p,o);if(e)return e;
   const t=p.m-1+(o.months||0)+(o.years||0)*12,y=p.y+Math.floor(t/12),m=((t%12)+12)%12+1;
   return{y,m,d:D.daysInMonth(y,m)};},
 shiftIfWeekend(p){const w=D.dow(p);
   if(w===0)return D.of(D.ms(p)+86400000); if(w===6)return D.of(D.ms(p)+2*86400000); return p;}
};

/* ============================================================
   判定エンジン
   ============================================================ */
function valuationDate(dep,hasAgent){
  const r=hasAgent?RULES.valuation.withTaxAgent:RULES.valuation.withoutTaxAgent;
  if(r.offsetMonths===0)return{ok:true,date:dep,basis:'atDeparture'};
  const d=D.shiftResponseDay(dep,{months:r.offsetMonths});
  return d?{ok:true,date:d,basis:'threeMonthsPrior'}
          :{ok:false,reason:'noResponseDay',basis:'threeMonthsPrior'};
}
function thresholdCheck(total){
  if(total===null||total===undefined||Number.isNaN(total))return{ok:false,reason:'notEntered'};
  const t=RULES.threshold.amount;
  return{ok:true,met:RULES.threshold.comparison==='gte'?total>=t:total>t,distance:total-t};
}
// 所基通2-4の3 に倣った国内在住期間の計算。
// 「暦に従って計算し、1月に満たない期間は日をもって数える。複数ある場合は年数・月数・日数を
//  それぞれ合計し、日数は30日をもって1月とし、月数は12月をもって1年とする。」
// 日数の単純合計では、5年線の前後12日で結論が割れることを検証済み。
function ymdSpanFrom(start,to){
  if(D.cmp(start,to)>0)return{y:0,m:0,d:0};
  let y=0,cur=start;
  for(;;){const nx=D.shiftClamped(cur,{years:1});if(D.cmp(D.of(D.ms(nx)-86400000),to)>0)break;y++;cur=nx;}
  let m=0;
  for(;;){const nx=D.shiftClamped(cur,{months:1});if(D.cmp(D.of(D.ms(nx)-86400000),to)>0)break;m++;cur=nx;}
  return{y,m,d:D.diffDays(to,cur)+1};
}
function residencyCheck(dep,always,periods){
  if(always)return{ok:true,met:true,basis:'always'};
  if(!periods||!periods.length)return{ok:false,reason:'periodsIncomplete'};
  // 窓は所基通2-4の2 に倣い「出国日の10年前の同日」から「出国日の前日」まで
  const ws=D.shiftClamped(dep,{years:-RULES.residency.lookbackYears});
  const we=D.of(D.ms(dep)-86400000);
  let Y=0,M=0,Dd=0;
  for(const p of periods){
    if(p.from===null||p.to===null)return{ok:false,reason:'periodsIncomplete'};
    if(!D.isValid(p.from)||!D.isValid(p.to))return{ok:false,reason:'invalidPeriod'};
    if(D.cmp(p.from,p.to)>0)return{ok:false,reason:'reversedPeriod'};
    const clipped=D.cmp(p.from,ws)<0;
    const from=clipped?ws:p.from, to=D.cmp(p.to,we)>0?we:p.to;
    if(D.cmp(from,to)>0)continue;
    // 入国の日の翌日から起算する。ただし窓で切られた側は入国日ではないので、そのまま算入する。
    const s=ymdSpanFrom(clipped?from:D.of(D.ms(from)+86400000),to);
    Y+=s.y;M+=s.m;Dd+=s.d;
  }
  M+=Math.floor(Dd/RULES.residency.counting.daysPerMonth);
  Dd=Dd%RULES.residency.counting.daysPerMonth;
  Y+=Math.floor(M/RULES.residency.counting.monthsPerYear);
  M=M%RULES.residency.counting.monthsPerYear;
  const per=RULES.residency.counting.daysPerMonth*RULES.residency.counting.monthsPerYear;
  const dist=(Y*per+M*RULES.residency.counting.daysPerMonth+Dd)-RULES.residency.requiredYears*per;
  return{ok:true,met:dist>0,basis:'computed',span:{y:Y,m:M,d:Dd},dist,
         near:Math.abs(dist)<=RULES.residency.nearLineDays};
}
function buildTimeline(dep,o,today){
  const flags={agent:!!o.hasTaxAgent,noAgent:!o.hasTaxAgent,
               deferral:!!o.hasTaxAgent&&!!o.wantsDeferral};
  const out=[];
  for(const it of RULES.timeline.transfer){
    if(it.showIf&&!flags[it.showIf])continue;
    let date=null,und=null;
    if(it.rule==='mar15OfNextYear')date=D.shiftIfWeekend({y:dep.y+1,m:3,d:15});
    else if(it.dayRule==='responseDay'){date=D.shiftResponseDay(dep,it.offset);if(!date)und='noResponseDay';}
    else if(it.offset&&(it.offset.years||it.offset.months))
      date=it.precision==='approx'?D.shiftClamped(dep,it.offset):D.shiftResponseDay(dep,it.offset);
    else date=dep;
    out.push({id:it.id,date,und,precision:it.precision,severity:it.severity||'normal',
              recurring:!!it.recurring,delta:date?D.diffDays(date,today):null});
  }
  return out.sort((a,b)=>(a.date&&b.date)?D.cmp(a.date,b.date):0);
}
// 何が足りないかを、設問の順に返す
function missingList(s){
  const out=[];
  // 残りは単調に減ること。早期returnで数えると、答えるたびに件数が増えて見える。
  if(s.isResident===null)out.push('isResident');
  else if(s.isResident===false)return[];
  // STEP 2 は設問が2つ（予定の有無・予定日）だが、画面の見出しは1つ。
  // リスト側に無い番号を出さないため、両方そろって初めて消える1項目として見せる。
  if(s.willDepart===false)return[];
  if(s.willDepart===null||!D.isValid(s.departure))out.push('willDepart');
  if(s.alwaysInJapan===null)out.push('alwaysInJapan');
  else if(s.alwaysInJapan===false){
    const bad=(!s.periods||!s.periods.length)||s.periods.some(p=>p.from===null||p.to===null);
    if(bad)out.push('periods');
  }
  if(s.hasTaxAgent===null)out.push('hasTaxAgent');
  if(s.totalValue===null||Number.isNaN(s.totalValue))out.push('totalValue');
  return out;
}
function evaluate(s,today){
  if(s.isResident===false)return{verdict:'notSubject',reasons:['notResident']};
  if(s.willDepart===false)return{verdict:'notSubject',reasons:['noDeparturePlan']};
  if(s.isResident===null||s.willDepart===null)return{verdict:'incomplete',reasons:[]};
  if(!D.isValid(s.departure))return{verdict:'incomplete',reasons:['departureDateRequired']};
  if(D.cmp(s.departure,RULES.meta.enforcedFrom)<0)return{verdict:'notSubject',reasons:['beforeEnforcement']};
  if(s.alwaysInJapan===null)return{verdict:'incomplete',reasons:[]};

  const res=residencyCheck(s.departure,s.alwaysInJapan,s.periods);
  if(!res.ok&&res.reason==='periodsIncomplete')return{verdict:'incomplete',reasons:[],residency:res};
  if(!res.ok)return{verdict:'undecidable',reasons:[res.reason],residency:res};
  if(!res.met)return{verdict:'notSubject',reasons:['residencyNotMet'],residency:res};
  if(s.hasTaxAgent===null)return{verdict:'incomplete',reasons:[],residency:res};

  const val=valuationDate(s.departure,s.hasTaxAgent);
  if(!val.ok)return{verdict:'undecidable',reasons:[val.reason],residency:res};

  const th=thresholdCheck(s.totalValue);
  if(!th.ok)return{verdict:'incomplete',reasons:[th.reason],valuation:val,residency:res};
  if(!th.met)return{verdict:'notSubject',reasons:['thresholdNotMet'],valuation:val,residency:res,threshold:th};
  return{verdict:'subject',reasons:[],valuation:val,residency:res,threshold:th,
         timeline:buildTimeline(s.departure,s,today)};
}

const TODAY=(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()+1,d:n.getDate()};})();

const blank=()=>({isResident:null,willDepart:null,departure:null,alwaysInJapan:null,
  periods:[],hasTaxAgent:null,wantsDeferral:false,totalValue:null,gain:null});

/* ---- 文言ヘルパ ---- */
const T=k=>I18N[LANG][k]!==undefined?I18N[LANG][k]:k;
const fill=(k,o)=>String(T(k)).replace(/\{(\w+)\}/g,(_,n)=>o[n]!==undefined?o[n]:`{${n}}`);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// 教訓：鉤括弧付きの用語が行末で分断されるため、描画の出口で折り返し禁止を自動付与する
const nb=h=>String(h).replace(/(「[^」]{1,24}」|『[^』]{1,24}』)/g,'<span class="nb">$1</span>');
const money=n=>new Intl.NumberFormat(LANG==='ja'?'ja-JP':'en-US').format(Math.round(n));
// 単位つきの数。単数形は辞書側に持つ（コードに英文法を書かない）
const unit=(k,n)=>fill(n===1?k+'1':k,{n});
// 「◯年◯か月◯日」。0の単位は出さない。全部0なら「0日」。
const spanText=s=>{const p=[];
  if(s.y)p.push(unit('ymd_y',s.y)); if(s.m)p.push(unit('ymd_m',s.m));
  if(s.d||!p.length)p.push(unit('ymd_d',s.d));
  return p.join(LANG==='ja'?'':' ');};
// 期限までの距離。1年未満は日数のまま、それ以上は年・か月にする。
// 「あと4034日」と言われても像が結ばない。日付そのものは隣に出ているので、
// 遠い期限に日単位の精度は要らない。行は増やさない。
const coarse=(from,to)=>{
  let y=0,cur=from;
  for(;;){const nx=D.shiftClamped(cur,{years:1}); if(D.cmp(nx,to)>0)break; y++; cur=nx;}
  let m=0;
  for(;;){const nx=D.shiftClamped(cur,{months:1}); if(D.cmp(nx,to)>0)break; m++; cur=nx;}
  const p=[]; if(y)p.push(unit('ymd_y',y)); if(m)p.push(unit('ymd_m',m));
  return p.length?p.join(LANG==='ja'?'':' '):unit('ymd_d',0);};
const deltaText=(date,n)=>{
  if(n===0)return T('tlToday');
  const v=Math.abs(n)<365?unit('ymd_d',Math.abs(n))
                         :coarse(n>0?TODAY:date, n>0?date:TODAY);
  return n>0?fill('tlIn',{v}):fill('tlAgo',{v});};
// 通達の単位（30日=1月・12月=1年）で表した距離を、年月日に戻す
const distText=n=>{const per=RULES.residency.counting.daysPerMonth;
  return spanText({y:Math.floor(n/(per*RULES.residency.counting.monthsPerYear)),
    m:Math.floor((n%(per*RULES.residency.counting.monthsPerYear))/per), d:n%per});};
const dateStr=p=>!p?'—':(LANG==='ja'
  ?`${p.y}.${String(p.m).padStart(2,'0')}.${String(p.d).padStart(2,'0')}`
  :`${p.y}-${String(p.m).padStart(2,'0')}-${String(p.d).padStart(2,'0')}`);

/* ---- 期間行：影響範囲だけを更新する（全体再描画しない） ---- */
function addPeriodRow(v){
  const i=S.periods.length; S.periods.push(v||{from:null,to:null});
  const row=document.createElement('div'); row.className='prow'; row.dataset.i=i;
  row.innerHTML=`<input type="date" data-k="from"><span data-t="s3to"></span>
    <input type="date" data-k="to"><button type="button" data-del data-t="s3del"></button>`;
  if(v&&v.from)row.querySelector('[data-k=from]').value=D.iso(v.from);
  if(v&&v.to)  row.querySelector('[data-k=to]').value=D.iso(v.to);
  row.addEventListener('input',e=>{
    const k=e.target.dataset.k; if(!k)return;
    S.periods[+row.dataset.i][k]=D.parse(e.target.value);
    renderOutput();                         // 入力行のDOMには一切触らない
  });
  row.querySelector('[data-del]').addEventListener('click',()=>{
    const idx=+row.dataset.i; S.periods.splice(idx,1); row.remove();
    [...document.querySelectorAll('#periods .prow')].forEach((r,n)=>r.dataset.i=n);
    renderOutput();
  });
  document.getElementById('periods').appendChild(row);
  applyStatic(row);
}

// 金額入力：入力しながら3桁区切りを入れる。1億円の桁では0を1つ数え違えるだけで致命的。
// カーソルは「左から数字が何個目か」で復元する。位置で戻すとカンマの増減でずれる。
function bindMoney(el,set,after){
  el.addEventListener('input',e=>{
    const t=e.target, before=t.value, pos=t.selectionStart||0;
    const nth=before.slice(0,pos).replace(/\D/g,'').length;   // カーソル左にある数字の個数
    const neg=/^\s*-/.test(before);
    const digits=before.replace(/\D/g,'');
    const val=digits===''?null:(neg?-1:1)*Number(digits);
    set(val);
    const out=val===null?(neg?'-':''):money(val);
    if(out!==before){
      t.value=out;
      let seen=0,i=0;
      if(nth>0){ for(;i<out.length;i++){ if(/\d/.test(out[i])){ seen++; if(seen===nth){ i++; break; } } } }
      else i=neg?1:0;
      try{ t.setSelectionRange(i,i); }catch(err){}
    }
    if(after)after();
  });
}

/* ---- 文言の流し込み（テキストのみ。入力要素は作り直さない） ---- */
function applyStatic(root){
  (root||document).querySelectorAll('[data-t]').forEach(el=>{ el.innerHTML=nb(esc(T(el.dataset.t))); });
}

/* ============================================================
   描画は render() 一本に集約する（初期描画とイベントで二重に書かない）
   ============================================================ */
function render(){
  document.documentElement.lang=LANG;
  document.title=T('title');
  document.querySelectorAll('.langsw button').forEach(b=>
    b.setAttribute('aria-pressed',String(b.dataset.lang===LANG)));
  ['title','tagline','notthis'].forEach(k=>document.getElementById('t-'+k).innerHTML=nb(esc(T(k))));
  skeleton();                 // 言語に依存する資産リストを含むため作り直す
  applyStatic();
  restoreInputs();
  renderOutput();
}
function restoreInputs(){
  const dep=document.getElementById('in-dep');
  if(S.departure)dep.value=D.iso(S.departure);
  dep.addEventListener('input',e=>{S.departure=D.parse(e.target.value);renderOutput();});
  const amt=document.getElementById('in-amt');
  if(S.totalValue!==null)amt.value=money(S.totalValue);
  bindMoney(amt,v=>{S.totalValue=v;},renderOutput);
  const def=document.getElementById('in-def');
  if(def){ def.checked=!!S.wantsDeferral;
    def.addEventListener('change',e=>{S.wantsDeferral=e.target.checked;renderOutput();}); }
  document.querySelectorAll('[data-grp]').forEach(g=>{
    const key=g.dataset.grp;
    g.querySelectorAll('button').forEach(b=>{
      b.setAttribute('aria-pressed',String(S[key]===(b.dataset.v==='true')));
      b.addEventListener('click',()=>{ S[key]=(b.dataset.v==='true'); render(); });
    });
  });
  document.getElementById('periods').innerHTML='';
  const keep=S.periods.slice(); S.periods=[];
  keep.forEach(p=>addPeriodRow(p));
  if(S.alwaysInJapan===false&&S.periods.length===0)addPeriodRow();
  document.getElementById('btn-addrow').addEventListener('click',()=>addPeriodRow());
}

function renderOutput(){
  // 段階的開示：前の答えが出るまで次を出さない
  const show=(id,c)=>document.getElementById(id).hidden=!c;
  show('st2',S.isResident===true);
  show('fld-dep',S.willDepart===true);
  show('st3',S.willDepart===true&&D.isValid(S.departure));
  show('fld-per',S.alwaysInJapan===false);
  const res=D.isValid(S.departure)?residencyCheck(S.departure,S.alwaysInJapan,S.periods):null;
  show('st4',S.alwaysInJapan!==null&&res&&res.ok&&res.met);
  show('fld-def',S.hasTaxAgent===true);
  const val=(S.hasTaxAgent!==null&&D.isValid(S.departure))?valuationDate(S.departure,S.hasTaxAgent):null;
  show('st5',!!(val&&val.ok&&res&&res.ok&&res.met));

  if(val&&val.ok){
    document.getElementById('basis-line').innerHTML=nb(esc(
      val.basis==='atDeparture'?T('s5basisAt'):fill('s5basis3m',{date:dateStr(val.date)})));
  }
  const r=evaluate(S,TODAY);
  const box=document.getElementById('result');
  box.classList.toggle('pending',r.verdict==='incomplete');
  box.innerHTML=resultHTML(r);
  bindResult();
}

function resultHTML(r){
  let h=`<p class="verdict">${nb(esc(T('v_'+r.verdict)))}</p>`;

  if(r.verdict==='incomplete'){
    const need=missingList(S);
    h+=`<p class="vsub">${esc(fill('incompleteCount',{n:need.length}))}</p>`;
    h+=`<ul class="needs">${need.map((k,i)=>
      `<li class="${i===0?'next':''}">${nb(esc(T('need_'+k)))}${i===0
        ?`<span class="nexttag">${esc(T('needNext'))}</span>`:''}</li>`).join('')}</ul>`;
    return h;
  }

  h+=`<p class="vsub">${nb(esc(T('v_'+r.verdict+'Sub')))}</p>`;
  h+=printSummary();   // 画面には出さない。紙にしたとき入力が消えていると相談に使えない。

  for(const rs of (r.reasons||[])){
    let msg;
    if(rs==='noResponseDay'){
      const t=D.shiftClamped(S.departure,{months:-3});
      msg=fill('r_noResponseDay',{dep:dateStr(S.departure),ym:`${t.y}.${String(t.m).padStart(2,'0')}`});
    }else msg=T('r_'+rs);
    h+=`<p class="vsub" style="margin-top:.7rem;color:var(--ink-2)">${nb(esc(msg))}</p>`;
  }

  // 期間を入力した人には、国内在住期間と5年線からの距離を必ず見せる（1億円と同じ扱い）
  const rc=r.residency;
  if(rc&&rc.ok&&rc.basis==='computed'){
    h+=`<p class="distance">${esc(fill('res_span',{span:spanText(rc.span)}))}</p>`;
    h+=`<p class="distance">${esc(rc.dist>0?fill('res_over',{diff:distText(rc.dist)})
      :rc.dist<0?fill('res_under',{diff:distText(-rc.dist)}):T('res_exact'))}</p>`;
    if(rc.near)h+=`<p class="vsub" style="margin-top:.4rem">${nb(esc(T('res_near')))}</p>`;
    h+=`<div class="legalterm">${nb(esc(T('res_basis')))}</div>`;
  }

  if(r.threshold&&r.threshold.ok){
    const d=r.threshold.distance;
    h+=`<p class="distance">${esc(d>=0?fill('distanceOver',{n:money(d)}):fill('distanceUnder',{n:money(-d)}))}</p>`;
    if(Math.abs(d)<=RULES.threshold.amount*0.1)
      h+=`<p class="vsub" style="margin-top:.3rem">${nb(esc(T('nearThreshold')))}</p>`;
  }

  if(r.verdict==='subject'){
    h+=`<div class="tl"><p class="tlhead">${esc(fill('tlHead',{date:dateStr(S.departure)}))}</p>`;
    h+=`<ul class="tlist">${timelineHTML(r.timeline)}</ul>`;
    if(r.timeline.some(i=>i.precision==='approx'))
      h+=`<p class="sidenote" style="margin-top:.8rem">${nb(esc(T('tlApproxNote')))}</p>`;
    h+=`</div>`;
    h+=`<div class="legalterm">${nb(esc(T('termHead')))}<br>${nb(esc(T('term_subject')))}</div>`;
    h+=`<div class="legalterm"><strong>${nb(esc(T('statuteHead')))}</strong><br>${nb(esc(T('statuteBody')))}</div>`;
    h+=`<div class="legalterm"><strong>${nb(esc(T('fxCreditHead')))}</strong><br>${nb(esc(T('fxCreditBody')))}</div>`;
    h+=`<details><summary><span>${esc(T('estSum'))}</span><span class="whofor">${esc(T('estWho'))}</span></summary>
      <div class="dbody"><div class="field">
      <label class="q" style="font-size:.87rem" for="in-gain">${esc(T('estQ'))}</label>
      <input type="text" inputmode="numeric" id="in-gain"${S.gain!==null?` value="${money(S.gain)}"`:''}>
      <p class="sidenote">${esc(T('estHelp'))}</p></div>
      <p class="distance" id="est-out">${S.gain!==null&&S.gain>0?esc(fill('estResult',{n:money(S.gain*RULES.taxRate.total)})):''}</p>
      <p class="sidenote" style="margin-top:.5rem">${nb(esc(T('estNote')))}</p></div></details>`;
  }

  if(r.verdict!=='incomplete'){
    h+=`<details><summary><span>${esc(T('inheritSum'))}</span><span class="whofor">${esc(T('inheritWho'))}</span></summary>
      <div class="dbody"><p class="sidenote">${nb(esc(T('inheritBody')))}</p></div></details>`;
    h+=`<details><summary><span>${esc(T('giftSum'))}</span><span class="whofor">${esc(T('giftWho'))}</span></summary>
      <div class="dbody"><p class="sidenote">${nb(esc(T('giftBody')))}</p></div></details>`;
  }
  return h;
}

// 印刷専用の入力サマリー。税理士に渡す紙に「何を入れたか」が無いと役に立たない。
function printSummary(){
  const row=(k,v)=>(v===null||v===undefined||v==='')?'':
    `<tr><th>${nb(esc(T(k)))}</th><td>${nb(esc(v))}</td></tr>`;
  const yn=b=>b?T('ps_yes'):T('ps_no');
  const val=D.isValid(S.departure)&&S.hasTaxAgent!==null?valuationDate(S.departure,S.hasTaxAgent):null;
  let rows='';
  rows+=row('s2date',D.isValid(S.departure)?dateStr(S.departure):null);
  rows+=row('ps_stay',S.alwaysInJapan===null?null:S.alwaysInJapan?T('s3yes')
    :S.periods.filter(p=>p.from&&p.to).map(p=>`${dateStr(p.from)} - ${dateStr(p.to)}`).join('  /  '));
  rows+=row('ps_agent',S.hasTaxAgent===null?null:yn(S.hasTaxAgent));
  if(S.hasTaxAgent)rows+=row('ps_deferral',yn(S.wantsDeferral));
  if(val&&val.ok)rows+=row('ps_basis',dateStr(val.date));
  rows+=row('ps_total',S.totalValue===null?null:money(S.totalValue));
  if(S.gain!==null)rows+=row('ps_gain',money(S.gain));
  rows+=row('ps_on',dateStr(TODAY));
  return rows?`<div class="printsum"><h3>${nb(esc(T('ps_head')))}</h3><table>${rows}</table></div>`:'';
}

function timelineHTML(items){
  const rows=items.map(i=>({...i,sort:i.date?D.ms(i.date):0}));
  rows.push({id:'__today',date:TODAY,sort:D.ms(TODAY),delta:0,today:true});
  rows.sort((a,b)=>a.sort-b.sort);
  return rows.map(i=>{
    if(i.today) return `<li class="tli today"><span class="tdate">${esc(dateStr(TODAY))}</span>
      <span class="tlabel">${esc(T('tl_today'))}</span></li>`;
    const cls=['tli']; if(i.severity==='critical')cls.push('crit'); if(i.delta<0)cls.push('past');
    const delta=deltaText(i.date,i.delta);
    return `<li class="${cls.join(' ')}">
      <span class="tdate">${esc(dateStr(i.date))}<span class="tdelta">${esc(delta)}</span></span>
      <span class="tlabel">${nb(esc(T('tl_'+i.id)))}${i.recurring?`<span class="approx">${esc(T('tlRecur'))}</span>`:''}${i.precision==='approx'?`<span class="approx">${esc(T('tlApprox'))}</span>`:''}</span></li>`;
  }).join('');
}

function bindResult(){
  const g=document.getElementById('in-gain'); if(!g)return;
  bindMoney(g,v=>{S.gain=v;},()=>{        // 影響範囲だけ差し替える＝カーソルが飛ばない
    const o=document.getElementById('est-out');
    if(o)o.textContent=(S.gain!==null&&S.gain>0)?fill('estResult',{n:money(S.gain*RULES.taxRate.total)}):'';
    const ps=document.querySelector('.printsum');   // 紙にも含み益を載せる
    if(ps)ps.outerHTML=printSummary();
  });
}

/* ---- URL共有：#s= にBase64。後方互換のため v を持たせる ---- */
function encodeState(){
  const p={v:1,l:LANG,r:S.isResident,w:S.willDepart,d:S.departure?D.iso(S.departure):null,
    a:S.alwaysInJapan,t:S.hasTaxAgent,f:S.wantsDeferral,m:S.totalValue,g:S.gain,
    p:S.periods.map(x=>[x.from?D.iso(x.from):null,x.to?D.iso(x.to):null])};
  return btoa(unescape(encodeURIComponent(JSON.stringify(p)))).replace(/=+$/,'');
}
function decodeState(h){
  try{
    const j=JSON.parse(decodeURIComponent(escape(atob(h))));
    if(!j||typeof j!=='object')return false;
    if(j.l==='ja'||j.l==='en')LANG=j.l;
    S=blank();
    // 未知のバージョンでも、読める鍵だけ拾う（後方互換）
    if(typeof j.r==='boolean')S.isResident=j.r;
    if(typeof j.w==='boolean')S.willDepart=j.w;
    if(typeof j.a==='boolean')S.alwaysInJapan=j.a;
    if(typeof j.t==='boolean')S.hasTaxAgent=j.t;
    if(typeof j.f==='boolean')S.wantsDeferral=j.f;
    if(typeof j.m==='number')S.totalValue=j.m;
    if(typeof j.g==='number')S.gain=j.g;
    S.departure=D.parse(j.d);
    if(Array.isArray(j.p))S.periods=j.p.filter(Array.isArray)
      .map(x=>({from:D.parse(x[0]),to:D.parse(x[1])}));
    return true;
  }catch(e){ return false; }
}

/* ---- 起動 ---- */
document.querySelectorAll('.langsw button').forEach(b=>
  b.addEventListener('click',()=>{LANG=b.dataset.lang;render();renderStatic();}));
document.getElementById('btn-print').addEventListener('click',()=>window.print());
document.getElementById('btn-reset').addEventListener('click',()=>{
  S=blank(); setHash('');
  render(); renderStatic();
});
// サンドボックス内のiframeやblob:では history も location.origin も当てにできない
function setHash(h){
  try{ history.replaceState(null,'',h||location.pathname+location.search); return true; }
  catch(err){ try{ location.hash=h; }catch(e2){} return false; }
}
function shareURL(){
  const base=(location.origin&&location.origin!=='null')
    ? location.origin+location.pathname+location.search
    : String(location.href).split('#')[0];
  return base+'#s='+encodeState();
}
document.getElementById('btn-share').addEventListener('click',async e=>{
  const label=e.target.textContent, url=shareURL();
  setHash('#s='+encodeState());
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      await navigator.clipboard.writeText(url); e.target.textContent=T('shareCopied');
    }else{ e.target.textContent=T('shareFailed'); }
  }catch(err){ e.target.textContent=T('shareFailed'); }
  setTimeout(()=>{e.target.textContent=label;},2200);
});
if(String(location.hash||'').startsWith('#s='))decodeState(location.hash.slice(3));
else if(navigator.language&&!navigator.language.toLowerCase().startsWith('ja'))LANG='en';
render(); renderStatic();

</script>
